<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./images/calculator-icon.png" />
    <link rel="stylesheet" href="./style.css" />
    <title>Timer, Calculator & Stopwatch</title>
  </head>
  <body>
    <div class="timer">
      <h1 class="timer_title">Timer</h1>
      <div class="timer_case">
        <div class="timer_display">
          <input
            type="number"
            class="timer_hours_input"
            min="0"
            max="23"
            placeholder="HH"
          />
          :
          <input
            type="number"
            class="timer_minutes_input"
            min="0"
            max="59"
            placeholder="MM"
          />
          :
          <input
            type="number"
            class="timer_seconds_input"
            min="0"
            max="59"
            placeholder="SS"
          />
        </div>
        <div class="timer_buttons">
          <button class="set_timer_button">Set Timer</button>
          <button class="timer_reset_button">Reset</button>
          <button class="timer_start_button">Start</button>
          <button class="timer_pause_button">Pause</button>
        </div>
      </div>
    </div>

    <div class="calculator">
      <h1 class="calculator_title">Calculator</h1>
      <div class="calculator_case">
        <div class="calculator_display">
          <p class="calculator_text">0</p>
        </div>
        <div class="keyboard">
          <div class="other_button">
            <button class="clear_button">C</button>
            <button class="clear_entry_button">CE</button>
            <button class="plus-minus-button">±</button>
            <button class="number_button">9</button>
            <button class="number_button">8</button>
            <button class="number_button">7</button>
            <button class="number_button">6</button>
            <button class="number_button">5</button>
            <button class="number_button">4</button>
            <button class="number_button">3</button>
            <button class="number_button">2</button>
            <button class="number_button">1</button>
            <button class="percentual_button">%</button>
            <button class="number_button">0</button>
            <button class="point_button">.</button>
          </div>
          <div class="symbol">
            <button class="over_button symbol_button">÷</button>
            <button class="multiply_button symbol_button">×</button>
            <button class="minus_button symbol_button">-</button>
            <button class="plus_button symbol_button">+</button>
            <button class="equals_button">=</button>
          </div>
        </div>
      </div>
    </div>

    <div class="stopwatch">
      <h1 class="stopwatch_title">Stopwatch</h1>
      <div class="stopwatch_case">
        <div class="stopwatch_display">
          <p class="stopwatch_hours">00</p>
          :
          <p class="stopwatch_minutes">00</p>
          :
          <p class="stopwatch_seconds">00</p>
          :
          <p class="stopwatch_milliseconds">00</p>
        </div>
        <div class="stopwatch_buttons">
          <button class="stopwatch_reset_button stopwatch_button">Reset</button>
          <button class="stopwatch_start_button stopwatch_button">Start</button>
          <button class="stopwatch_pause_button stopwatch_button">Pause</button>
        </div>
      </div>
    </div>
    <script src="./calculator.js"></script>
    <script src="./timer.js"></script>
    <script src="./stopwatch.js"></script>
  </body>
</html>
